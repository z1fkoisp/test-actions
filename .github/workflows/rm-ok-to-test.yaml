name: Remove ok-to-test
'on':
  pull_request:
    types:
    - synchronize
    - reopened
jobs:
  rm-ok-to-test:
    if: contains(github.event.pull_request.labels.*.name, 'ok-to-test')
    runs-on: ubuntu-latest
    name: Remove ok-to-test
    steps:
    - uses: actions-ecosystem/action-remove-labels@v1
      with:
        labels: ok-to-test
